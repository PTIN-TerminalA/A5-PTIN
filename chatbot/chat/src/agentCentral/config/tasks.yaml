answer_question_task:
  description: >
    Utiliza el historial de conversación si es relevante:
    {history}

    Ahora responde a esta consulta del usuario:
    {user_message}

    Este agente responde preguntas realizadas por el usuario de manera clara, útil y concisa. Utiliza el conocimiento disponible en el archivo dades_serveis.csv y adapta el tono según el tipo de pregunta.
  expected_output: >
    Respuesta completa en el idioma de la pregunta {user_message}, con información adaptada del CSV dades_serveis.csv, incluyendo:
                        - Nombre del establecimiento
                        - Ubicación exacta (terminal y puerta)
                        - Horario
                        - Precio (si aplica)
                        - Información adicional relevante
